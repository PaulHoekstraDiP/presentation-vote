<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>How many lines of code?</title>

    <!-- Sansation: DiP primary brand font -->
    <link href="https://fonts.cdnfonts.com/css/sansation" rel="stylesheet">
    <!-- Outfit: fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===========================================
           VOTING PAGE — built from Figma design
           File: ebTqIp2L5UBuKM71y6K2ZD
           =========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dip-deep-green: #044318;
            --dip-orange: #FF8A00;
            --dip-lime: #BFFF3F;
            --font: 'Sansation', 'Outfit', sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--dip-deep-green);
            font-family: var(--font);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* === LAYOUT — matches Figma frame 1:2 === */
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 60px 32px 40px;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* === HEADER === */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            line-height: 30px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #999;
        }

        /* === INPUT STACK === */
        .input-stack {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 500;
            color: #b3b3b3;
            letter-spacing: 0.96px;
            text-transform: uppercase;
        }

        .input-box {
            width: 100%;
            height: 72px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .input-box:focus-within {
            border-color: var(--dip-orange);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: var(--font);
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-box input::-webkit-outer-spin-button,
        .input-box input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* === SUBMIT BUTTON — matches Figma node 1:18 === */
        .submit-btn {
            background: var(--dip-orange);
            border: none;
            border-radius: 28px;
            padding: 16px 40px;
            font-family: var(--font);
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            font-size: 13px;
            color: #737373;
            text-align: center;
        }

        /* === SUBMITTED STATE === */
        .submitted .content { display: none; }

        .thank-you {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .submitted .thank-you { display: flex; }

        .thank-you .check {
            font-size: 56px;
            line-height: 1;
        }

        .thank-you h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .thank-you p {
            font-size: 16px;
            color: #999;
        }

        .guess-echo {
            font-size: 44px;
            font-weight: 700;
            color: var(--dip-orange);
            line-height: 1.1;
        }

        .guess-echo-name {
            font-size: 18px;
            font-weight: 400;
            color: #b3b3b3;
            margin-top: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === ERROR STATE === */
        .error-msg {
            font-size: 14px;
            color: #ff6b6b;
            min-height: 20px;
            text-align: center;
        }

        /* === "WHICH MICHAEL?" MODAL === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 24px;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.open { display: flex; }

        .modal-card {
            background: var(--dip-deep-green);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-card h3 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .modal-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-btn {
            padding: 16px 20px;
            border-radius: 14px;
            border: none;
            font-family: var(--font);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .modal-btn:active { transform: scale(0.97); opacity: 0.9; }

        .modal-btn.cannon { background: var(--dip-orange); }
        .modal-btn.pistol {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: var(--dip-lime);
        }
    </style>
</head>
<body>
    <div class="page" id="page">
        <!-- VOTE FORM -->
        <div class="content">
            <div class="header">
                <svg class="brand-icon" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#ci0)"><rect x="51.7" y="51.7" width="310.2" height="310.2" rx="155.1" fill="#68A337"/><path d="M207.3 116.3c-46.7 0-84.5 37.8-84.5 84.5 0 37 23.9 68.5 57.1 79.9v19.7c0 10.3 8.3 18.6 18.6 18.6h17.5c10.3 0 18.6-8.3 18.6-18.6v-19.7c33.2-11.4 57.1-42.9 57.1-79.9 0-46.7-37.8-84.5-84.5-84.5z" fill="#C7DF78"/><path d="M225.5 217.6c-25.9 5.1-61.8 19.2-4.2 35.3 1.1.3 1.2 2 .1 2.4-22.5 7.2-48.2 21.7 4.1 30.9" stroke="#FF8A00" stroke-width="13.4" stroke-linecap="round"/><rect x="165.4" y="305.1" width="82.8" height="24.5" rx="12.2" fill="#3A841D"/><rect x="165.4" y="280.6" width="82.8" height="24.5" rx="12.2" fill="#3A841D"/><path d="M147.5 108.2c3.9-9.9 13.4-16.4 24.1-16.4h174c11 0 18.5 11 14.5 21.2l-87.5 223.5c-3.9 9.9-13.4 16.4-24.1 16.4H74.4c-10.9 0-18.4-11-14.4-21.2l87.5-223.5z" fill="#C7DF78"/><path d="M196.8 262c4.8 0 8.6 3.9 8.6 8.6v1.1c0 4.8-3.9 8.6-8.6 8.6s-8.6-3.9-8.6-8.6v-1.1c0-4.7 3.8-8.6 8.6-8.6zm-19.8-80.6c0-2.3 1.6-4.3 3.9-4.8 9-1.9 17.7-2.9 25.9-2.9 25.6 0 38.4 9.7 38.4 29.1 0 21.4-14.3 32.3-38.1 32.8-.9 0-1.7.7-1.7 1.6v10.5c0 2.8-2.2 5-5 5h-7.2c-2.8 0-5-2.2-5-5v-22.8c0-2.8 2.2-5 5-5h14.7c12.7 0 19-5.7 19-17.1 0-8.9-6.7-13.4-20.1-13.4-7.6 0-15.4.8-23.6 2.4-3.2.6-6.2-1.8-6.2-5v-5.4z" fill="#FF8A00"/><path d="M204.1 89.3c1.8-4.8 6.4-7.9 11.5-7.9h79.9c7.1 0 12 7.1 9.4 13.7-2.5 6.5-8.8 10.8-15.7 10.8h-73.6c-8.6 0-14.5-8.6-11.5-16.6z" fill="#3A841D"/></g><defs><clipPath id="ci0"><rect width="420" height="420" fill="white"/></clipPath></defs></svg>
                <h1 class="title">How many lines of code<br>is this presentation?</h1>
                <p class="subtitle">Closest guess wins</p>
            </div>

            <div class="input-stack">
                <div class="input-group">
                    <span class="input-label">Your name</span>
                    <div class="input-box">
                        <input type="text" id="name" maxlength="30"
                               placeholder="Name" autocomplete="off" autocapitalize="words">
                    </div>
                </div>

                <div class="input-group">
                    <span class="input-label">Lines of code</span>
                    <div class="input-box">
                        <input type="number" id="lines" min="1" max="999999"
                               placeholder="0" inputmode="numeric" autocomplete="off">
                    </div>
                </div>
            </div>

            <p class="error-msg" id="error"></p>

            <button class="submit-btn" id="submitBtn" onclick="submitGuess()">
                Submit my guess
            </button>

            <p class="footer">One guess per person</p>
        </div>

        <!-- THANK YOU STATE -->
        <div class="thank-you">
            <svg class="brand-icon" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#ci1)"><rect x="51.7" y="51.7" width="310.2" height="310.2" rx="155.1" fill="#68A337"/><path d="M207.3 116.3c-46.7 0-84.5 37.8-84.5 84.5 0 37 23.9 68.5 57.1 79.9v19.7c0 10.3 8.3 18.6 18.6 18.6h17.5c10.3 0 18.6-8.3 18.6-18.6v-19.7c33.2-11.4 57.1-42.9 57.1-79.9 0-46.7-37.8-84.5-84.5-84.5z" fill="#C7DF78"/><path d="M225.5 217.6c-25.9 5.1-61.8 19.2-4.2 35.3 1.1.3 1.2 2 .1 2.4-22.5 7.2-48.2 21.7 4.1 30.9" stroke="#FF8A00" stroke-width="13.4" stroke-linecap="round"/><rect x="165.4" y="305.1" width="82.8" height="24.5" rx="12.2" fill="#3A841D"/><rect x="165.4" y="280.6" width="82.8" height="24.5" rx="12.2" fill="#3A841D"/><path d="M147.5 108.2c3.9-9.9 13.4-16.4 24.1-16.4h174c11 0 18.5 11 14.5 21.2l-87.5 223.5c-3.9 9.9-13.4 16.4-24.1 16.4H74.4c-10.9 0-18.4-11-14.4-21.2l87.5-223.5z" fill="#C7DF78"/><path d="M167.6 218.2l17.4 36.4c.7 1.5 2.6 2 3.9 1l70-53.6" stroke="#FF8A00" stroke-width="20.7" stroke-linecap="round"/></g><defs><clipPath id="ci1"><rect width="420" height="420" fill="white"/></clipPath></defs></svg>
            <h2>Thanks!</h2>
            <div class="guess-echo" id="guessEcho"></div>
            <div class="guess-echo-name" id="guessEchoName"></div>
            <p>Your guess has been recorded</p>
        </div>
    </div>

    <!-- Easter egg: "Which Michael?" picker -->
    <div class="modal-overlay" id="michaelModal" role="dialog" aria-modal="true" aria-labelledby="michaelModalTitle">
        <div class="modal-card">
            <h3 id="michaelModalTitle">Which Michael?</h3>
            <div class="modal-btns">
                <button type="button" class="modal-btn cannon" data-alias="Data Cannon">Data Cannon</button>
                <button type="button" class="modal-btn pistol" data-alias="Data Pistol">Data Pistol</button>
            </div>
        </div>
    </div>

    <script>
        /* ===========================================
           VOTING LOGIC
           POSTs { name: string, lines: int } to Supabase.
           =========================================== */

        const SUPABASE_URL = '__SUPABASE_URL__';
        const SUPABASE_KEY = '__SUPABASE_KEY__';
        const HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
        };

        // Name aliases: silent rewrite for known attendees, picker for ambiguous ones.
        // Michael matches as a whole word anywhere in the name ("Michael Smith",
        // "Smith Michael", etc.) — but not substrings like "Carmichael".
        function resolveAlias(rawName) {
            const key = rawName.trim().toLowerCase();
            if (/\bmichael\b/.test(key)) return askWhichMichael();
            if (key === 'stefan')        return Promise.resolve('Mr. Databricks');
            return Promise.resolve(rawName.trim());
        }

        function askWhichMichael() {
            return new Promise(resolve => {
                const modal = document.getElementById('michaelModal');
                modal.classList.add('open');
                const onClick = (e) => {
                    const alias = e.target && e.target.dataset && e.target.dataset.alias;
                    if (!alias) return;
                    modal.classList.remove('open');
                    modal.removeEventListener('click', onClick);
                    resolve(alias);
                };
                modal.addEventListener('click', onClick);
            });
        }

        function submitGuess() {
            const nameEl = document.getElementById('name');
            const linesEl = document.getElementById('lines');
            const errorEl = document.getElementById('error');
            const btn = document.getElementById('submitBtn');

            if (btn.disabled) return;

            const rawName = (nameEl.value || '').trim();
            const lines = parseInt(linesEl.value);

            if (!rawName) {
                errorEl.textContent = 'Enter your name';
                return;
            }
            if (!Number.isFinite(lines) || lines < 1) {
                errorEl.textContent = 'Enter a number of lines';
                return;
            }

            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            resolveAlias(rawName).then(name => {
                return fetch(`${SUPABASE_URL}/rest/v1/votes`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify({ name, lines })
                }).then(r => {
                    if (!r.ok) throw new Error('Network error');
                    showThankYou(name, lines);
                });
            }).catch(() => {
                errorEl.textContent = 'Failed to submit — try again';
                btn.disabled = false;
                btn.textContent = 'Submit my guess';
            });
        }

        function showThankYou(name, lines) {
            document.getElementById('guessEcho').textContent = lines.toLocaleString() + ' lines';
            document.getElementById('guessEchoName').textContent = 'as ' + name;
            document.getElementById('page').classList.add('submitted');
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') submitGuess();
        });
    </script>
</body>
</html>
